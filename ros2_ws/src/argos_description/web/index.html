<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARGOS Mission Control</title>
<script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e; --panel: #16213e; --accent: #0f3460;
    --text: #e0e0e0; --highlight: #e94560; --green: #4ecca3;
    --orange: #ff9f43; --blue: #54a0ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif; background: var(--bg);
    color: var(--text); height: 100vh; overflow: hidden;
  }
  header {
    background: var(--accent); padding: 10px 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  #conn-status {
    padding: 4px 12px; border-radius: 12px; font-size: 12px;
    background: #666; color: #fff;
  }
  #conn-status.connected { background: var(--green); color: #000; }
  #conn-status.error { background: var(--highlight); }

  .grid {
    display: grid; height: calc(100vh - 44px);
    grid-template-columns: 260px 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 6px; padding: 6px;
  }
  .panel {
    background: var(--panel); border-radius: 8px; padding: 12px;
    overflow-y: auto;
  }
  .panel h2 {
    font-size: 13px; text-transform: uppercase; color: #888;
    border-bottom: 1px solid #333; padding-bottom: 6px; margin-bottom: 10px;
  }

  /* Left column */
  .sidebar { grid-row: 1 / 3; display: flex; flex-direction: column; gap: 6px; }
  .mission-info .field { margin-bottom: 8px; }
  .mission-info .label { font-size: 11px; color: #888; }
  .mission-info .value { font-size: 16px; font-weight: 600; }
  .mission-info .stage { font-size: 20px; }

  /* Stage colors */
  .stage-init { color: #888; }
  .stage-exploring { color: var(--blue); }
  .stage-fire { color: var(--highlight); }
  .stage-returning { color: var(--orange); }
  .stage-complete { color: var(--green); }
  .stage-paused { color: #888; }

  /* Controls */
  .controls { display: flex; flex-direction: column; gap: 6px; }
  .controls button {
    padding: 8px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 600; color: #fff; transition: 0.2s;
  }
  .controls button:hover { filter: brightness(1.2); }
  .controls button:disabled { opacity: 0.5; cursor: not-allowed; }
  .controls button.active { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  .btn-estop { background: var(--highlight); }
  .btn-resume { background: var(--green); color: #000 !important; }
  .btn-takeoff { background: var(--blue); }
  .btn-land { background: var(--orange); color: #000 !important; }

  /* Battery bar */
  .battery-bar {
    display: inline-block; width: 40px; height: 12px;
    background: #333; border-radius: 3px; overflow: hidden; vertical-align: middle;
  }
  .battery-fill {
    height: 100%; border-radius: 3px; transition: width 0.5s;
  }

  /* Fire alerts */
  .fire-log { max-height: 150px; overflow-y: auto; }
  .fire-entry {
    padding: 6px 8px; margin-bottom: 4px; border-radius: 4px;
    font-size: 12px; border-left: 3px solid var(--highlight);
    background: rgba(233, 69, 96, 0.1);
  }

  /* Map canvas */
  #map-canvas {
    width: 100%; height: 100%; background: #111;
    border-radius: 6px; display: block;
  }

  /* Robot table */
  .robot-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .robot-table th {
    text-align: left; padding: 6px 8px; border-bottom: 1px solid #333;
    color: #888; font-weight: 500;
  }
  .robot-table td { padding: 6px 8px; border-bottom: 1px solid #222; }
  .robot-table .state-badge {
    padding: 2px 8px; border-radius: 10px; font-size: 11px;
    display: inline-block;
  }
  .state-idle { background: #444; }
  .state-exploring { background: var(--blue); color: #000; }
  .state-mission { background: var(--orange); color: #000; }
  .state-returning { background: #666; }
  .state-error { background: var(--highlight); }
  .state-lost { background: #333; color: #888; }

  .drone-badge { color: var(--blue); }
  .ugv-badge { color: var(--green); }

  /* Drone state badge in table */
  .drone-state-badge {
    padding: 2px 6px; border-radius: 10px; font-size: 10px;
    display: inline-block; margin-left: 4px;
  }
  /* Progress bar */
  .progress-bar {
    display: inline-block; width: 40px; height: 12px;
    background: #333; border-radius: 3px; overflow: hidden; vertical-align: middle;
  }
  .progress-fill {
    height: 100%; border-radius: 3px; background: var(--blue); transition: width 0.5s;
  }

  /* Battery critical blink */
  .battery-critical { animation: bat-blink 0.8s infinite; }
  @keyframes bat-blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .drone-grounded { background: #444; }
  .drone-taking_off { background: var(--blue); color: #000; }
  .drone-hovering { background: var(--green); color: #000; }
  .drone-flying { background: var(--orange); color: #000; }
  .drone-landing { background: var(--highlight); }

  /* Stage timeline */
  .stage-timeline {
    display: flex; gap: 2px; margin: 8px 0; align-items: center;
  }
  .stage-dot {
    width: 10px; height: 10px; border-radius: 50%; background: #333;
    border: 1px solid #555; flex-shrink: 0;
  }
  .stage-dot.active { background: var(--blue); border-color: var(--blue); box-shadow: 0 0 6px var(--blue); }
  .stage-dot.done { background: var(--green); border-color: var(--green); }
  .stage-dot.fire-active { background: var(--highlight); border-color: var(--highlight); box-shadow: 0 0 6px var(--highlight); }
  .stage-line { width: 12px; height: 2px; background: #333; flex-shrink: 0; }
  .stage-line.done { background: var(--green); }
  .stage-label { font-size: 9px; color: #666; text-align: center; }
  .stage-label.active { color: var(--text); font-weight: 600; }

  /* Nav error indicator */
  .nav-errors { color: var(--orange); font-size: 11px; }

  /* Reconnect counter */
  #reconnect-count { font-size: 10px; color: #888; margin-left: 8px; }

  /* Robot detail popup */
  #robot-popup {
    display: none; position: absolute; background: var(--panel);
    border: 1px solid var(--accent); border-radius: 8px; padding: 12px;
    font-size: 12px; min-width: 200px; z-index: 100;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  }
  #robot-popup h3 { font-size: 14px; margin-bottom: 8px; color: var(--blue); }
  #robot-popup .popup-row { display: flex; justify-content: space-between; padding: 2px 0; }
  #robot-popup .popup-label { color: #888; }
  #robot-popup .popup-close {
    position: absolute; top: 6px; right: 10px; cursor: pointer;
    color: #888; font-size: 16px;
  }
  #robot-popup .popup-close:hover { color: var(--highlight); }
</style>
</head>
<body>

<header>
  <h1>ARGOS Mission Control</h1>
  <span id="conn-status">Disconnected</span><span id="reconnect-count"></span>
</header>

<div class="grid">
  <!-- Left sidebar -->
  <div class="sidebar">
    <div class="panel mission-info">
      <h2>Mission State</h2>
      <div class="field">
        <div class="label">Stage</div>
        <div class="value stage" id="stage">INIT</div>
      </div>
      <div class="field">
        <div class="label">Elapsed</div>
        <div class="value" id="elapsed">0s</div>
      </div>
      <div class="field">
        <div class="label">Coverage</div>
        <div class="value" id="coverage">0%</div>
      </div>
      <div class="field">
        <div class="label">Robots (Active / Total)</div>
        <div class="value" id="robot-count">0 / 0</div>
      </div>
      <div class="field">
        <div class="label">Comm Lost</div>
        <div class="value" id="comm-lost" style="color:var(--orange)">0</div>
      </div>
      <div class="field">
        <div class="label">Fires</div>
        <div class="value" id="fire-count" style="color:var(--highlight)">0</div>
      </div>
      <div class="field">
        <div class="label">Primary Responder</div>
        <div class="value" id="primary-responder" style="font-size:14px">-</div>
      </div>
      <div class="field">
        <div class="label">Stage Timeline</div>
        <div class="stage-timeline" id="stage-timeline"></div>
      </div>
    </div>

    <div class="panel">
      <h2>Controls</h2>
      <div class="controls">
        <button class="btn-estop" id="btn-estop" onclick="callServiceBtn(this, '/orchestrator/emergency_stop')">
          EMERGENCY STOP
        </button>
        <button class="btn-resume" id="btn-resume" onclick="callServiceBtn(this, '/orchestrator/resume')">
          Resume
        </button>
        <button class="btn-takeoff" onclick="callServiceBtn(this, '/drone1/drone/takeoff')">
          Drone Takeoff
        </button>
        <button class="btn-land" onclick="callServiceBtn(this, '/drone1/drone/land')">
          Drone Land
        </button>
      </div>
    </div>

    <div class="panel">
      <h2>Fire Alerts</h2>
      <div class="fire-log" id="fire-log">
        <div style="color:#666; font-size:12px">No alerts</div>
      </div>
    </div>
  </div>

  <!-- Map panel -->
  <div class="panel" style="position:relative">
    <h2>Map View (10m x 8m)</h2>
    <canvas id="map-canvas"></canvas>
    <div id="robot-popup"></div>
  </div>

  <!-- Robot status table -->
  <div class="panel">
    <h2>Robot Status</h2>
    <table class="robot-table">
      <thead>
        <tr>
          <th>Robot</th><th>Type</th><th>State</th>
          <th>Position</th><th>Mission</th><th>Progress</th><th>Err</th><th>Battery</th>
        </tr>
      </thead>
      <tbody id="robot-tbody"></tbody>
    </table>
  </div>
</div>

<script>
// ─────────────── Configuration ───────────────
const WS_URL = `ws://${location.hostname || 'localhost'}:9090`;
const MAP_W = 10, MAP_H = 8;  // meters
const STAGE_NAMES = ['INIT', 'EXPLORING', 'FIRE_RESPONSE', 'RETURNING', 'COMPLETE', 'PAUSED'];
const STAGE_CLASSES = ['stage-init', 'stage-exploring', 'stage-fire', 'stage-returning', 'stage-complete', 'stage-paused'];
const STATE_NAMES = ['IDLE', 'EXPLORING', 'ON_MISSION', 'RETURNING', 'ERROR', 'COMM_LOST'];
const STATE_CLASSES = ['state-idle', 'state-exploring', 'state-mission', 'state-returning', 'state-error', 'state-lost'];

// ─────────────── State ───────────────
const robots = {};      // robot_id → latest RobotStatus
const fireAlerts = [];  // list of FireAlert
const droneStates = {}; // drone_id → state string (grounded/hovering/flying/landing)
let missionState = null;
let subscribedDrones = new Set();  // 동적으로 구독한 드론 목록
let reconnectCount = 0;
const stageHistory = [];  // [{stage, time}] — 단계 전환 기록
const robotTrails = {};   // robot_id → [{x, y}] — 최근 위치 궤적
const TRAIL_MAX = 60;     // 궤적 최대 포인트 수 (30초 분량 @2Hz)
let selectedRobot = null; // 클릭된 로봇 ID

// ─────────────── ROS Connection ───────────────
const ros = new ROSLIB.Ros({ url: WS_URL });
const statusEl = document.getElementById('conn-status');

ros.on('connection', () => {
  statusEl.textContent = 'Connected';
  statusEl.className = 'connected';
  subscribe();
});
ros.on('error', () => {
  statusEl.textContent = 'Error';
  statusEl.className = 'error';
});
ros.on('close', () => {
  statusEl.textContent = 'Disconnected';
  statusEl.className = '';
  reconnectCount++;
  document.getElementById('reconnect-count').textContent =
    reconnectCount > 0 ? `(reconnects: ${reconnectCount})` : '';
  setTimeout(() => ros.connect(WS_URL), 3000);
});

// ─────────────── Subscriptions ───────────────
let activeSubscriptions = [];

function subscribe() {
  // 기존 구독 해제 (재연결 시 중복 방지)
  activeSubscriptions.forEach(topic => topic.unsubscribe());
  activeSubscriptions = [];

  // Mission State (2 Hz from orchestrator)
  const missionTopic = new ROSLIB.Topic({
    ros, name: '/orchestrator/mission_state',
    messageType: 'my_robot_interfaces/MissionState'
  });
  missionTopic.subscribe(msg => {
    missionState = msg;
    updateMissionPanel(msg);
  });
  activeSubscriptions.push(missionTopic);

  // Robot Status (per-robot, 2 Hz each)
  const statusTopic = new ROSLIB.Topic({
    ros, name: '/orchestrator/robot_status',
    messageType: 'my_robot_interfaces/RobotStatus'
  });
  statusTopic.subscribe(msg => {
    robots[msg.robot_id] = msg;
    // 궤적 저장
    const p = msg.pose && msg.pose.pose && msg.pose.pose.position;
    if (p) {
      if (!robotTrails[msg.robot_id]) robotTrails[msg.robot_id] = [];
      const trail = robotTrails[msg.robot_id];
      trail.push({x: p.x, y: p.y});
      if (trail.length > TRAIL_MAX) trail.shift();
    }
    updateRobotTable();
  });
  activeSubscriptions.push(statusTopic);

  // Fire Alerts
  const fireTopic = new ROSLIB.Topic({
    ros, name: '/orchestrator/fire_alert',
    messageType: 'my_robot_interfaces/FireAlert'
  });
  fireTopic.subscribe(msg => {
    fireAlerts.unshift(msg);
    if (fireAlerts.length > 20) fireAlerts.pop();
    updateFireLog();
  });
  activeSubscriptions.push(fireTopic);

}

// 드론 상태 동적 구독 (MissionState의 robot_ids에서 드론 감지 시 자동 구독)
function subscribeDroneState(droneId) {
  if (subscribedDrones.has(droneId)) return;
  subscribedDrones.add(droneId);
  const droneTopic = new ROSLIB.Topic({
    ros, name: `/${droneId}/drone/state`,
    messageType: 'std_msgs/String'
  });
  droneTopic.subscribe(msg => {
    droneStates[droneId] = msg.data;
    updateRobotTable();
  });
  activeSubscriptions.push(droneTopic);
}

// ─────────────── Service Calls ───────────────
function callServiceBtn(btn, name) {
  const originalText = btn.textContent;
  btn.disabled = true;
  btn.classList.add('active');
  btn.textContent = 'Sending...';

  const srv = new ROSLIB.Service({
    ros, name, serviceType: 'std_srvs/Trigger'
  });
  srv.callService(
    new ROSLIB.ServiceRequest({}),
    res => {
      btn.textContent = res.success ? 'OK' : 'Failed';
      setTimeout(() => {
        btn.textContent = originalText;
        btn.disabled = false;
        btn.classList.remove('active');
      }, 1500);
    },
    err => {
      console.error(`${name} failed:`, err);
      btn.textContent = 'Error';
      setTimeout(() => {
        btn.textContent = originalText;
        btn.disabled = false;
        btn.classList.remove('active');
      }, 1500);
    }
  );
}

// ─────────────── UI Updates ───────────────
function formatElapsed(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function updateMissionPanel(m) {
  const stageIdx = m.stage || 0;
  const el = document.getElementById('stage');
  el.textContent = STAGE_NAMES[stageIdx] || 'UNKNOWN';
  el.className = 'value stage ' + (STAGE_CLASSES[stageIdx] || '');

  document.getElementById('elapsed').textContent =
    formatElapsed(m.elapsed_sec || 0);
  document.getElementById('coverage').textContent =
    (m.overall_coverage_percent || 0).toFixed(1) + '%';
  document.getElementById('robot-count').textContent =
    `${m.active_robots || 0} / ${m.total_robots || 0}`;
  document.getElementById('comm-lost').textContent =
    m.comm_lost_robots || 0;
  document.getElementById('fire-count').textContent =
    m.fire_count || 0;
  document.getElementById('primary-responder').textContent =
    m.primary_responder || '-';

  // 스테이지 전환 기록
  if (stageHistory.length === 0 || stageHistory[stageHistory.length - 1].stage !== stageIdx) {
    stageHistory.push({ stage: stageIdx, time: m.elapsed_sec || 0 });
  }
  updateStageTimeline(stageIdx);

  // 동적 드론 감지: robot_type이 'drone'인 로봇 자동 구독
  for (const [id, r] of Object.entries(robots)) {
    if (r.robot_type === 'drone') subscribeDroneState(id);
  }
}

function updateStageTimeline(currentStage) {
  const container = document.getElementById('stage-timeline');
  const labels = ['INIT', 'EXPL', 'FIRE', 'RTN', 'DONE'];
  const maxStageReached = Math.max(...stageHistory.map(h => h.stage), currentStage);
  let html = '';
  for (let i = 0; i < 5; i++) {
    if (i > 0) {
      const lineDone = i <= maxStageReached ? ' done' : '';
      html += `<div class="stage-line${lineDone}"></div>`;
    }
    let dotClass = 'stage-dot';
    let labelClass = 'stage-label';
    if (i === currentStage) {
      dotClass += i === 2 ? ' fire-active' : ' active';
      labelClass += ' active';
    } else if (i < maxStageReached || stageHistory.some(h => h.stage === i)) {
      dotClass += ' done';
    }
    html += `<div style="text-align:center"><div class="${dotClass}"></div><div class="${labelClass}">${labels[i]}</div></div>`;
  }
  container.innerHTML = html;
}

function updateRobotTable() {
  const tbody = document.getElementById('robot-tbody');
  tbody.innerHTML = '';
  for (const [id, r] of Object.entries(robots)) {
    const stateIdx = r.state || 0;
    const isDrone = r.robot_type === 'drone';
    const typeBadge = isDrone ? 'drone-badge' : 'ugv-badge';
    const p = r.pose && r.pose.pose && r.pose.pose.position;
    // 드론은 고도(z) 포함
    const pos = p
      ? (isDrone
        ? `(${p.x.toFixed(1)}, ${p.y.toFixed(1)}, z=${p.z.toFixed(1)})`
        : `(${p.x.toFixed(1)}, ${p.y.toFixed(1)})`)
      : '(?, ?)';
    const bat = r.battery_percent || 0;
    const batColor = bat > 50 ? 'var(--green)' : bat > 20 ? 'var(--orange)' : 'var(--highlight)';
    // 드론 비행 상태 배지
    const droneState = isDrone && droneStates[id] ? droneStates[id] : '';
    const droneStateBadge = droneState
      ? `<span class="drone-state-badge drone-${droneState}">${droneState.toUpperCase()}</span>`
      : '';
    const progress = ((r.mission_progress || 0) * 100).toFixed(0);
    const frontiers = r.frontiers_remaining || 0;
    const progressLabel = isDrone ? '-' : `${progress}% (${frontiers})`;
    const navErr = r.nav_error_count || 0;
    const navErrDisplay = isDrone ? '-' : (navErr > 0 ? `<span class="nav-errors">${navErr}</span>` : '0');
    tbody.innerHTML += `<tr>
      <td><strong>${id}</strong></td>
      <td class="${typeBadge}">${(r.robot_type || 'ugv').toUpperCase()}</td>
      <td><span class="state-badge ${STATE_CLASSES[stateIdx]}">${STATE_NAMES[stateIdx]}</span>${droneStateBadge}</td>
      <td>${pos}</td>
      <td>${r.current_mission || '-'}</td>
      <td>${isDrone ? '-' : `<span class="progress-bar"><span class="progress-fill" style="width:${progress}%"></span></span> ${progressLabel}`}</td>
      <td>${navErrDisplay}</td>
      <td class="${bat <= 15 ? 'battery-critical' : ''}">
        <span class="battery-bar"><span class="battery-fill" style="width:${bat}%;background:${batColor}"></span></span>
        ${bat.toFixed(0)}%
      </td>
    </tr>`;
  }
}

function updateFireLog() {
  const log = document.getElementById('fire-log');
  if (fireAlerts.length === 0) {
    log.innerHTML = '<div style="color:#666;font-size:12px">No alerts</div>';
    return;
  }
  log.innerHTML = fireAlerts.map(a => {
    const loc = a.location && a.location.point
      ? `(${a.location.point.x.toFixed(1)}, ${a.location.point.y.toFixed(1)})`
      : '(?, ?)';
    const temp = a.max_temperature_kelvin
      ? (a.max_temperature_kelvin - 273.15).toFixed(0) + 'C'
      : '?C';
    return `<div class="fire-entry">
      <strong>${a.robot_id}</strong> ${a.severity} ${temp} @ ${loc}
    </div>`;
  }).join('');
}

// ─────────────── 2D Map Canvas ───────────────
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width - 24;
  canvas.height = rect.height - 40;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function drawMap() {
  const w = canvas.width, h = canvas.height;
  const sx = w / MAP_W, sy = h / MAP_H;
  const scale = Math.min(sx, sy);
  const ox = (w - MAP_W * scale) / 2;
  const oy = (h - MAP_H * scale) / 2;

  ctx.clearRect(0, 0, w, h);

  // Background
  ctx.fillStyle = '#0a0a15';
  ctx.fillRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 1;
  for (let x = 0; x <= MAP_W; x++) {
    ctx.beginPath();
    ctx.moveTo(ox + x * scale, oy);
    ctx.lineTo(ox + x * scale, oy + MAP_H * scale);
    ctx.stroke();
  }
  for (let y = 0; y <= MAP_H; y++) {
    ctx.beginPath();
    ctx.moveTo(ox, oy + y * scale);
    ctx.lineTo(ox + MAP_W * scale, oy + y * scale);
    ctx.stroke();
  }

  // Walls (simplified indoor_test layout)
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 3;
  ctx.strokeRect(ox, oy, MAP_W * scale, MAP_H * scale);

  // Internal walls
  ctx.beginPath();
  // Room A left wall
  ctx.moveTo(ox + 3 * scale, oy + 5 * scale);
  ctx.lineTo(ox + 3 * scale, oy + 5.6 * scale);
  ctx.moveTo(ox + 3 * scale, oy + 6.8 * scale);
  ctx.lineTo(ox + 3 * scale, oy + 8 * scale);
  // Room B right wall
  ctx.moveTo(ox + 7 * scale, oy + 5 * scale);
  ctx.lineTo(ox + 7 * scale, oy + 5.6 * scale);
  ctx.moveTo(ox + 7 * scale, oy + 6.8 * scale);
  ctx.lineTo(ox + 7 * scale, oy + 8 * scale);
  // Corridor-C horizontal wall
  ctx.moveTo(ox, oy + 5 * scale);
  ctx.lineTo(ox + 4.4 * scale, oy + 5 * scale);
  ctx.moveTo(ox + 5.6 * scale, oy + 5 * scale);
  ctx.lineTo(ox + 10 * scale, oy + 5 * scale);
  ctx.stroke();

  // Room labels
  ctx.fillStyle = '#333';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Room A', ox + 1.5 * scale, oy + 6 * scale);
  ctx.fillText('Room B', ox + 8.5 * scale, oy + 6 * scale);
  ctx.fillText('Room C', ox + 5 * scale, oy + 2.5 * scale);
  ctx.fillText('Corridor', ox + 5 * scale, oy + 7 * scale);

  // Fire source indicator (Room A)
  ctx.fillStyle = 'rgba(233, 69, 96, 0.15)';
  ctx.beginPath();
  ctx.arc(ox + 1.5 * scale, oy + (MAP_H - 6.8) * scale, 20, 0, Math.PI * 2);
  ctx.fill();

  // Fire alerts
  fireAlerts.forEach(a => {
    if (!a.location || !a.location.point) return;
    const fx = ox + a.location.point.x * scale;
    const fy = oy + (MAP_H - a.location.point.y) * scale;
    ctx.fillStyle = 'rgba(233, 69, 96, 0.6)';
    ctx.beginPath();
    ctx.arc(fx, fy, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('FIRE', fx, fy - 12);
  });

  // Robot trails (궤적 — 점점 투명해지는 선)
  for (const [id, trail] of Object.entries(robotTrails)) {
    if (trail.length < 2) continue;
    const r = robots[id];
    const isDrone = r && r.robot_type === 'drone';
    const baseColor = isDrone ? '84,160,255' : '78,204,163';
    for (let i = 1; i < trail.length; i++) {
      const alpha = (i / trail.length) * 0.5;
      ctx.strokeStyle = `rgba(${baseColor},${alpha})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(ox + trail[i-1].x * scale, oy + (MAP_H - trail[i-1].y) * scale);
      ctx.lineTo(ox + trail[i].x * scale, oy + (MAP_H - trail[i].y) * scale);
      ctx.stroke();
    }
  }

  // Robots
  for (const [id, r] of Object.entries(robots)) {
    if (!r.pose || !r.pose.pose || !r.pose.pose.position) continue;
    const rx = ox + r.pose.pose.position.x * scale;
    const ry = oy + (MAP_H - r.pose.pose.position.y) * scale;
    const isDrone = r.robot_type === 'drone';

    // Robot body
    ctx.fillStyle = isDrone ? '#54a0ff' : '#4ecca3';
    if (isDrone) {
      // Diamond for drone
      ctx.beginPath();
      ctx.moveTo(rx, ry - 8);
      ctx.lineTo(rx + 8, ry);
      ctx.lineTo(rx, ry + 8);
      ctx.lineTo(rx - 8, ry);
      ctx.closePath();
      ctx.fill();
    } else {
      // Circle for UGV
      ctx.beginPath();
      ctx.arc(rx, ry, 7, 0, Math.PI * 2);
      ctx.fill();
    }

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(id, rx, ry - 12);

    // 드론: 고도 + 비행 상태 표시
    if (isDrone) {
      const alt = r.pose.pose.position.z || 0;
      const dState = droneStates[id] || '';
      ctx.fillStyle = 'rgba(84, 160, 255, 0.8)';
      ctx.font = '9px sans-serif';
      ctx.fillText(`${alt.toFixed(1)}m ${dState}`, rx, ry + 16);
    }
  }

  // HUD overlay (상단 좌측)
  if (missionState) {
    const fires = missionState.fire_count || 0;
    const hudH = fires > 0 ? 62 : 48;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(4, 4, 160, hudH);
    ctx.fillStyle = '#fff';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'left';
    const cov = (missionState.overall_coverage_percent || 0).toFixed(1);
    const stg = STAGE_NAMES[missionState.stage || 0];
    const elapsed = formatElapsed(missionState.elapsed_sec || 0);
    ctx.fillText(`Stage: ${stg}  ${elapsed}`, 8, 18);
    ctx.fillText(`Coverage: ${cov}%`, 8, 32);
    ctx.fillText(`Fires: ${fires}`, 8, 46);
    if (fires > 0 && fireAlerts.length > 0) {
      const sev = fireAlerts[0].severity || '?';
      ctx.fillStyle = '#e94560';
      ctx.fillText(`Severity: ${sev.toUpperCase()}`, 8, 60);
    }
  }

  // 선택된 로봇 하이라이트 링
  if (selectedRobot && robots[selectedRobot]) {
    const sr = robots[selectedRobot];
    if (sr.pose && sr.pose.pose && sr.pose.pose.position) {
      const srx = ox + sr.pose.pose.position.x * scale;
      const sry = oy + (MAP_H - sr.pose.pose.position.y) * scale;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(srx, sry, 14, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  requestAnimationFrame(drawMap);
}
drawMap();

// ─────────────── Map Click Handler ───────────────
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const w = canvas.width, h = canvas.height;
  const sx = w / MAP_W, sy = h / MAP_H;
  const s = Math.min(sx, sy);
  const ox = (w - MAP_W * s) / 2;
  const oy = (h - MAP_H * s) / 2;

  let closest = null, closestDist = 20; // 20px 클릭 반경
  for (const [id, r] of Object.entries(robots)) {
    if (!r.pose || !r.pose.pose || !r.pose.pose.position) continue;
    const rx = ox + r.pose.pose.position.x * s;
    const ry = oy + (MAP_H - r.pose.pose.position.y) * s;
    const d = Math.hypot(cx - rx, cy - ry);
    if (d < closestDist) { closest = id; closestDist = d; }
  }

  const popup = document.getElementById('robot-popup');
  if (closest) {
    selectedRobot = closest;
    const r = robots[closest];
    const p = r.pose && r.pose.pose && r.pose.pose.position;
    const bat = (r.battery_percent || 0).toFixed(1);
    const isDrone = r.robot_type === 'drone';
    const dState = isDrone ? (droneStates[closest] || '-') : '-';
    popup.innerHTML = `
      <span class="popup-close" onclick="document.getElementById('robot-popup').style.display='none';selectedRobot=null">&times;</span>
      <h3>${closest}</h3>
      <div class="popup-row"><span class="popup-label">Type</span><span>${(r.robot_type||'ugv').toUpperCase()}</span></div>
      <div class="popup-row"><span class="popup-label">State</span><span>${STATE_NAMES[r.state||0]}</span></div>
      ${isDrone ? `<div class="popup-row"><span class="popup-label">Flight</span><span>${dState}</span></div>` : ''}
      <div class="popup-row"><span class="popup-label">Position</span><span>${p?`(${p.x.toFixed(2)}, ${p.y.toFixed(2)}${isDrone?`, z=${p.z.toFixed(2)}`:''})`:'?'}</span></div>
      <div class="popup-row"><span class="popup-label">Battery</span><span>${bat}%</span></div>
      <div class="popup-row"><span class="popup-label">Mission</span><span>${r.current_mission||'-'}</span></div>
      <div class="popup-row"><span class="popup-label">Progress</span><span>${((r.mission_progress||0)*100).toFixed(1)}%</span></div>
      <div class="popup-row"><span class="popup-label">Frontiers</span><span>${r.frontiers_remaining||0}</span></div>
      <div class="popup-row"><span class="popup-label">Nav Errors</span><span>${r.nav_error_count||0}</span></div>
      <div class="popup-row"><span class="popup-label">Coverage</span><span>${(r.coverage_percent||0).toFixed(1)}%</span></div>
    `;
    // 팝업 위치: 클릭 위치 근처
    popup.style.left = Math.min(e.offsetX + 10, canvas.width - 220) + 'px';
    popup.style.top = Math.min(e.offsetY + 10, canvas.height - 200) + 'px';
    popup.style.display = 'block';
  } else {
    popup.style.display = 'none';
    selectedRobot = null;
  }
});
</script>
</body>
