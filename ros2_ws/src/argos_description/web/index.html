<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARGOS Mission Control</title>
<script src="https://cdn.jsdelivr.net/npm/roslib@1/build/roslib.min.js"></script>
<style>
  :root {
    --bg: #1a1a2e; --panel: #16213e; --accent: #0f3460;
    --text: #e0e0e0; --highlight: #e94560; --green: #4ecca3;
    --orange: #ff9f43; --blue: #54a0ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif; background: var(--bg);
    color: var(--text); height: 100vh; overflow: hidden;
  }
  header {
    background: var(--accent); padding: 10px 20px;
    display: flex; justify-content: space-between; align-items: center;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  #conn-status {
    padding: 4px 12px; border-radius: 12px; font-size: 12px;
    background: #666; color: #fff;
  }
  #conn-status.connected { background: var(--green); color: #000; }
  #conn-status.error { background: var(--highlight); }

  .grid {
    display: grid; height: calc(100vh - 44px);
    grid-template-columns: 260px 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 6px; padding: 6px;
  }
  .panel {
    background: var(--panel); border-radius: 8px; padding: 12px;
    overflow-y: auto;
  }
  .panel h2 {
    font-size: 13px; text-transform: uppercase; color: #888;
    border-bottom: 1px solid #333; padding-bottom: 6px; margin-bottom: 10px;
  }

  /* Left column */
  .sidebar { grid-row: 1 / 3; display: flex; flex-direction: column; gap: 6px; }
  .mission-info .field { margin-bottom: 8px; }
  .mission-info .label { font-size: 11px; color: #888; }
  .mission-info .value { font-size: 16px; font-weight: 600; }
  .mission-info .stage { font-size: 20px; }

  /* Stage colors */
  .stage-init { color: #888; }
  .stage-exploring { color: var(--blue); }
  .stage-fire { color: var(--highlight); }
  .stage-returning { color: var(--orange); }
  .stage-complete { color: var(--green); }
  .stage-paused { color: #888; }

  /* Controls */
  .controls { display: flex; flex-direction: column; gap: 6px; }
  .controls button {
    padding: 8px; border: none; border-radius: 6px; cursor: pointer;
    font-size: 13px; font-weight: 600; color: #fff; transition: 0.2s;
  }
  .controls button:hover { filter: brightness(1.2); }
  .btn-estop { background: var(--highlight); }
  .btn-resume { background: var(--green); color: #000 !important; }
  .btn-takeoff { background: var(--blue); }
  .btn-land { background: var(--orange); color: #000 !important; }

  /* Fire alerts */
  .fire-log { max-height: 150px; overflow-y: auto; }
  .fire-entry {
    padding: 6px 8px; margin-bottom: 4px; border-radius: 4px;
    font-size: 12px; border-left: 3px solid var(--highlight);
    background: rgba(233, 69, 96, 0.1);
  }

  /* Map canvas */
  #map-canvas {
    width: 100%; height: 100%; background: #111;
    border-radius: 6px; display: block;
  }

  /* Robot table */
  .robot-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .robot-table th {
    text-align: left; padding: 6px 8px; border-bottom: 1px solid #333;
    color: #888; font-weight: 500;
  }
  .robot-table td { padding: 6px 8px; border-bottom: 1px solid #222; }
  .robot-table .state-badge {
    padding: 2px 8px; border-radius: 10px; font-size: 11px;
    display: inline-block;
  }
  .state-idle { background: #444; }
  .state-exploring { background: var(--blue); color: #000; }
  .state-mission { background: var(--orange); color: #000; }
  .state-returning { background: #666; }
  .state-error { background: var(--highlight); }
  .state-lost { background: #333; color: #888; }

  .drone-badge { color: var(--blue); }
  .ugv-badge { color: var(--green); }
</style>
</head>
<body>

<header>
  <h1>ARGOS Mission Control</h1>
  <span id="conn-status">Disconnected</span>
</header>

<div class="grid">
  <!-- Left sidebar -->
  <div class="sidebar">
    <div class="panel mission-info">
      <h2>Mission State</h2>
      <div class="field">
        <div class="label">Stage</div>
        <div class="value stage" id="stage">INIT</div>
      </div>
      <div class="field">
        <div class="label">Elapsed</div>
        <div class="value" id="elapsed">0s</div>
      </div>
      <div class="field">
        <div class="label">Coverage</div>
        <div class="value" id="coverage">0%</div>
      </div>
      <div class="field">
        <div class="label">Robots</div>
        <div class="value" id="robot-count">0 / 0</div>
      </div>
      <div class="field">
        <div class="label">Fires</div>
        <div class="value" id="fire-count" style="color:var(--highlight)">0</div>
      </div>
    </div>

    <div class="panel">
      <h2>Controls</h2>
      <div class="controls">
        <button class="btn-estop" onclick="callService('/orchestrator/emergency_stop')">
          EMERGENCY STOP
        </button>
        <button class="btn-resume" onclick="callService('/orchestrator/resume')">
          Resume
        </button>
        <button class="btn-takeoff" onclick="callService('/drone1/drone/takeoff')">
          Drone Takeoff
        </button>
        <button class="btn-land" onclick="callService('/drone1/drone/land')">
          Drone Land
        </button>
      </div>
    </div>

    <div class="panel">
      <h2>Fire Alerts</h2>
      <div class="fire-log" id="fire-log">
        <div style="color:#666; font-size:12px">No alerts</div>
      </div>
    </div>
  </div>

  <!-- Map panel -->
  <div class="panel">
    <h2>Map View (10m x 8m)</h2>
    <canvas id="map-canvas"></canvas>
  </div>

  <!-- Robot status table -->
  <div class="panel">
    <h2>Robot Status</h2>
    <table class="robot-table">
      <thead>
        <tr>
          <th>Robot</th><th>Type</th><th>State</th>
          <th>Position</th><th>Mission</th><th>Battery</th>
        </tr>
      </thead>
      <tbody id="robot-tbody"></tbody>
    </table>
  </div>
</div>

<script>
// ─────────────── Configuration ───────────────
const WS_URL = `ws://${location.hostname || 'localhost'}:9090`;
const MAP_W = 10, MAP_H = 8;  // meters
const STAGE_NAMES = ['INIT', 'EXPLORING', 'FIRE_RESPONSE', 'RETURNING', 'COMPLETE', 'PAUSED'];
const STAGE_CLASSES = ['stage-init', 'stage-exploring', 'stage-fire', 'stage-returning', 'stage-complete', 'stage-paused'];
const STATE_NAMES = ['IDLE', 'EXPLORING', 'ON_MISSION', 'RETURNING', 'ERROR', 'COMM_LOST'];
const STATE_CLASSES = ['state-idle', 'state-exploring', 'state-mission', 'state-returning', 'state-error', 'state-lost'];

// ─────────────── State ───────────────
const robots = {};      // robot_id → latest RobotStatus
const fireAlerts = [];  // list of FireAlert
let missionState = null;

// ─────────────── ROS Connection ───────────────
const ros = new ROSLIB.Ros({ url: WS_URL });
const statusEl = document.getElementById('conn-status');

ros.on('connection', () => {
  statusEl.textContent = 'Connected';
  statusEl.className = 'connected';
  subscribe();
});
ros.on('error', () => {
  statusEl.textContent = 'Error';
  statusEl.className = 'error';
});
ros.on('close', () => {
  statusEl.textContent = 'Disconnected';
  statusEl.className = '';
  setTimeout(() => ros.connect(WS_URL), 3000);
});

// ─────────────── Subscriptions ───────────────
function subscribe() {
  // Mission State (2 Hz from orchestrator)
  new ROSLIB.Topic({
    ros, name: '/orchestrator/mission_state',
    messageType: 'my_robot_interfaces/MissionState'
  }).subscribe(msg => {
    missionState = msg;
    updateMissionPanel(msg);
  });

  // Robot Status (per-robot, 2 Hz each)
  new ROSLIB.Topic({
    ros, name: '/orchestrator/robot_status',
    messageType: 'my_robot_interfaces/RobotStatus'
  }).subscribe(msg => {
    robots[msg.robot_id] = msg;
    updateRobotTable();
  });

  // Fire Alerts
  new ROSLIB.Topic({
    ros, name: '/orchestrator/fire_alert',
    messageType: 'my_robot_interfaces/FireAlert'
  }).subscribe(msg => {
    fireAlerts.unshift(msg);
    if (fireAlerts.length > 20) fireAlerts.pop();
    updateFireLog();
  });
}

// ─────────────── Service Calls ───────────────
function callService(name) {
  const srv = new ROSLIB.Service({
    ros, name, serviceType: 'std_srvs/Trigger'
  });
  srv.callService(
    new ROSLIB.ServiceRequest({}),
    res => console.log(`${name}: ${res.message}`),
    err => console.error(`${name} failed:`, err)
  );
}

// ─────────────── UI Updates ───────────────
function updateMissionPanel(m) {
  const stageIdx = m.stage || 0;
  const el = document.getElementById('stage');
  el.textContent = STAGE_NAMES[stageIdx] || 'UNKNOWN';
  el.className = 'value stage ' + (STAGE_CLASSES[stageIdx] || '');

  document.getElementById('elapsed').textContent =
    Math.round(m.elapsed_sec || 0) + 's';
  document.getElementById('coverage').textContent =
    (m.overall_coverage_percent || 0).toFixed(1) + '%';
  document.getElementById('robot-count').textContent =
    `${m.active_robots || 0} / ${m.total_robots || 0}`;
  document.getElementById('fire-count').textContent =
    m.fire_count || 0;
}

function updateRobotTable() {
  const tbody = document.getElementById('robot-tbody');
  tbody.innerHTML = '';
  for (const [id, r] of Object.entries(robots)) {
    const stateIdx = r.state || 0;
    const typeBadge = r.robot_type === 'drone' ? 'drone-badge' : 'ugv-badge';
    const pos = r.pose && r.pose.position
      ? `(${r.pose.position.x.toFixed(1)}, ${r.pose.position.y.toFixed(1)})`
      : '(?, ?)';
    tbody.innerHTML += `<tr>
      <td><strong>${id}</strong></td>
      <td class="${typeBadge}">${(r.robot_type || 'ugv').toUpperCase()}</td>
      <td><span class="state-badge ${STATE_CLASSES[stateIdx]}">${STATE_NAMES[stateIdx]}</span></td>
      <td>${pos}</td>
      <td>${r.current_mission || '-'}</td>
      <td>${(r.battery_percent || 0).toFixed(0)}%</td>
    </tr>`;
  }
}

function updateFireLog() {
  const log = document.getElementById('fire-log');
  if (fireAlerts.length === 0) {
    log.innerHTML = '<div style="color:#666;font-size:12px">No alerts</div>';
    return;
  }
  log.innerHTML = fireAlerts.map(a => {
    const loc = a.location && a.location.point
      ? `(${a.location.point.x.toFixed(1)}, ${a.location.point.y.toFixed(1)})`
      : '(?, ?)';
    const temp = a.max_temperature_kelvin
      ? (a.max_temperature_kelvin - 273.15).toFixed(0) + 'C'
      : '?C';
    return `<div class="fire-entry">
      <strong>${a.robot_id}</strong> ${a.severity} ${temp} @ ${loc}
    </div>`;
  }).join('');
}

// ─────────────── 2D Map Canvas ───────────────
const canvas = document.getElementById('map-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width - 24;
  canvas.height = rect.height - 40;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function drawMap() {
  const w = canvas.width, h = canvas.height;
  const sx = w / MAP_W, sy = h / MAP_H;
  const scale = Math.min(sx, sy);
  const ox = (w - MAP_W * scale) / 2;
  const oy = (h - MAP_H * scale) / 2;

  ctx.clearRect(0, 0, w, h);

  // Background
  ctx.fillStyle = '#0a0a15';
  ctx.fillRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 1;
  for (let x = 0; x <= MAP_W; x++) {
    ctx.beginPath();
    ctx.moveTo(ox + x * scale, oy);
    ctx.lineTo(ox + x * scale, oy + MAP_H * scale);
    ctx.stroke();
  }
  for (let y = 0; y <= MAP_H; y++) {
    ctx.beginPath();
    ctx.moveTo(ox, oy + y * scale);
    ctx.lineTo(ox + MAP_W * scale, oy + y * scale);
    ctx.stroke();
  }

  // Walls (simplified indoor_test layout)
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 3;
  ctx.strokeRect(ox, oy, MAP_W * scale, MAP_H * scale);

  // Internal walls
  ctx.beginPath();
  // Room A left wall
  ctx.moveTo(ox + 3 * scale, oy + 5 * scale);
  ctx.lineTo(ox + 3 * scale, oy + 5.6 * scale);
  ctx.moveTo(ox + 3 * scale, oy + 6.8 * scale);
  ctx.lineTo(ox + 3 * scale, oy + 8 * scale);
  // Room B right wall
  ctx.moveTo(ox + 7 * scale, oy + 5 * scale);
  ctx.lineTo(ox + 7 * scale, oy + 5.6 * scale);
  ctx.moveTo(ox + 7 * scale, oy + 6.8 * scale);
  ctx.lineTo(ox + 7 * scale, oy + 8 * scale);
  // Corridor-C horizontal wall
  ctx.moveTo(ox, oy + 5 * scale);
  ctx.lineTo(ox + 4.4 * scale, oy + 5 * scale);
  ctx.moveTo(ox + 5.6 * scale, oy + 5 * scale);
  ctx.lineTo(ox + 10 * scale, oy + 5 * scale);
  ctx.stroke();

  // Room labels
  ctx.fillStyle = '#333';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Room A', ox + 1.5 * scale, oy + 6 * scale);
  ctx.fillText('Room B', ox + 8.5 * scale, oy + 6 * scale);
  ctx.fillText('Room C', ox + 5 * scale, oy + 2.5 * scale);
  ctx.fillText('Corridor', ox + 5 * scale, oy + 7 * scale);

  // Fire source indicator (Room A)
  ctx.fillStyle = 'rgba(233, 69, 96, 0.15)';
  ctx.beginPath();
  ctx.arc(ox + 1.5 * scale, oy + (MAP_H - 6.8) * scale, 20, 0, Math.PI * 2);
  ctx.fill();

  // Fire alerts
  fireAlerts.forEach(a => {
    if (!a.location || !a.location.point) return;
    const fx = ox + a.location.point.x * scale;
    const fy = oy + (MAP_H - a.location.point.y) * scale;
    ctx.fillStyle = 'rgba(233, 69, 96, 0.6)';
    ctx.beginPath();
    ctx.arc(fx, fy, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('FIRE', fx, fy - 12);
  });

  // Robots
  for (const [id, r] of Object.entries(robots)) {
    if (!r.pose || !r.pose.position) continue;
    const rx = ox + r.pose.position.x * scale;
    const ry = oy + (MAP_H - r.pose.position.y) * scale;
    const isDrone = r.robot_type === 'drone';

    // Robot body
    ctx.fillStyle = isDrone ? '#54a0ff' : '#4ecca3';
    if (isDrone) {
      // Diamond for drone
      ctx.beginPath();
      ctx.moveTo(rx, ry - 8);
      ctx.lineTo(rx + 8, ry);
      ctx.lineTo(rx, ry + 8);
      ctx.lineTo(rx - 8, ry);
      ctx.closePath();
      ctx.fill();
    } else {
      // Circle for UGV
      ctx.beginPath();
      ctx.arc(rx, ry, 7, 0, Math.PI * 2);
      ctx.fill();
    }

    // Label
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(id, rx, ry - 12);
  }

  requestAnimationFrame(drawMap);
}
drawMap();
</script>
</body>
</html>
