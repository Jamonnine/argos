# ARGOS UGV 컨트롤러 설정
# =========================
# diff_drive_controller: 4WD 스킵 스티어
# 좌/우 바퀴 쌍을 지정하면 4WD도 2WD와 동일하게 /cmd_vel로 제어 가능.

controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

diff_drive_controller:
  ros__parameters:
    # 좌측 바퀴 2개, 우측 바퀴 2개 → 4WD 스킵 스티어
    left_wheel_names:
      - "front_left_wheel_joint"
      - "rear_left_wheel_joint"
    right_wheel_names:
      - "front_right_wheel_joint"
      - "rear_right_wheel_joint"

    # 바퀴 간격 (좌-우 중심 거리)
    wheel_separation: 0.46  # base_width + wheel_width + gap

    # 바퀴 반경
    wheel_radius: 0.10

    # 속도 제한
    linear.x.max_velocity: 1.5        # m/s (소방 현장: 보행 속도 수준)
    linear.x.min_velocity: -0.5       # 후진 속도 제한
    angular.z.max_velocity: 2.0       # rad/s

    # 가속도 제한 (부드러운 기동)
    linear.x.max_acceleration: 1.0
    angular.z.max_acceleration: 3.0

    # 오도메트리
    publish_rate: 50.0
    odom_frame_id: "odom"
    base_frame_id: "base_footprint"
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    # 타임아웃 (명령 없으면 정지)
    cmd_vel_timeout: 0.5

    # TF 퍼블리시
    publish_odom_tf: true
