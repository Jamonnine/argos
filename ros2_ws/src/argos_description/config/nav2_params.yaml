# ARGOS UGV Nav2 + SLAM 파라미터
# ================================
# ARGOS 로봇 크기(0.6×0.4m)에 최적화.
# nav2_bringup slam=True 모드에서 이 파일 하나로 Nav2 + slam_toolbox 모두 설정.
#
# 핵심 구성:
#   - SmacPlanner2D: 차동구동 UGV 최적 격자 기반 경로 탐색 (NavfnPlanner 대체)
#   - MPPI Controller: 노이즈 궤적 샘플링 기반 로컬 플래너 (DWB 대체)
#   - footprint 폴리곤 0.6×0.4m (robot_radius 대신)
#   - base_footprint 프레임 통일
#   - ARGOS 속도/가속도 제한 (controllers.yaml 동기화)
#   - LiDAR 10m 범위 (gpu_lidar 12m 스펙)
#   - slam_toolbox 파라미터 포함

# Nav2 Lifecycle Manager: docking_server 제외 (ARGOS는 도킹 미사용)
# Nav2 Jazzy 기본값에 opennav_docking이 포함되어 있으나, dock 플러그인 미설정 시
# 전체 bringup이 중단되므로 명시적으로 제외.
lifecycle_manager_navigation:
  ros__parameters:
    autostart: true
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
      - collision_monitor
      - route_server

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.5
    # BT XML: 빈 문자열 제거 — Nav2 기본 BT 사용
    always_reload_bt_xml: false
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

controller_server:
  ros__parameters:
    controller_frequency: 20.0   # MPPI는 고빈도 제어가 효과적 (DWB 10Hz → 20Hz)
    min_x_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 15.0
    goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    FollowPath:
      # MPPI Controller: DWB 대체 — 노이즈 궤적 샘플링 기반
      # 동적 장애물 회피·좁은 복도 통과에 DWB 대비 월등
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56               # 예측 구간 스텝 수
      model_dt: 0.05               # 스텝당 시간 (56×0.05=2.8초 예측)
      batch_size: 2000             # 궤적 샘플 수 (CPU 기반, GPU 불필요)
      vx_std: 0.2                  # 속도 노이즈 표준편차
      vy_std: 0.0                  # 차동구동 → 횡방향 0
      wz_std: 0.4                  # 각속도 노이즈
      vx_max: 0.5                  # ARGOS 속도 제한
      vx_min: -0.35               # 후진 속도
      vy_max: 0.0                  # 차동구동
      wz_max: 1.5                  # 최대 각속도
      iteration_count: 1           # 최적화 반복 (1회면 충분)
      prune_distance: 1.7          # 경로 가지치기 거리
      transform_tolerance: 0.1
      temperature: 0.3             # 소프트맥스 온도 (낮을수록 최적 궤적 집중)
      gamma: 0.015                 # 이전 제어 관성 (안정성)
      motion_model: "DiffDrive"    # ARGOS UGV 운동 모델
      visualize: false             # RViz 궤적 시각화 (디버그 시 true)
      regenerate_noises: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      AckermannConstraints:
        min_turning_r: 0.2
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic",
                 "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic",
                 "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81           # costmap 장애물 비용
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      # ARGOS 0.6×0.4m + 안전 여유 5cm
      footprint: "[[0.35, 0.25], [0.35, -0.25], [-0.35, -0.25], [-0.35, 0.25]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 9.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      transform_tolerance: 0.5
      # ARGOS 0.6×0.4m + 안전 여유 5cm
      footprint: "[[0.35, 0.25], [0.35, -0.25], [-0.35, -0.25], [-0.35, 0.25]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 10.0
          raytrace_min_range: 0.0
          obstacle_max_range: 9.0
          obstacle_min_range: 0.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.55
        cost_scaling_factor: 3.0
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    planner_plugins: ["GridBased"]
    GridBased:
      # SmacPlanner2D: NavfnPlanner 대체 — 격자 기반 최적 경로 탐색
      # 차동구동(diff-drive) UGV에 최적화, 8방향 A* 확장
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.25
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0       # 최대 계획 시간 (초)
      cost_travel_multiplier: 2.0  # 장애물 근처 경로 비용 증가
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.5
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.0

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.5]
    min_velocity: [-0.5, 0.0, -1.5]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    max_accel: [1.0, 0.0, 3.0]
    max_decel: [-1.0, 0.0, -3.0]
    odom_topic: "odom"
    odom_duration: 0.1

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200

collision_monitor:
  ros__parameters:
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    transform_tolerance: 0.5
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["PolygonStop", "PolygonSlow"]
    PolygonStop:
      type: "polygon"
      # ARGOS 크기 + 10cm 긴급 정지 여유
      points: "[[0.45, 0.35], [0.45, -0.35], [-0.45, -0.35], [-0.45, 0.35]]"
      action_type: "stop"
      min_points: 4
      visualize: true
      polygon_pub_topic: "polygon_stop"
      enabled: true
    PolygonSlow:
      type: "polygon"
      # ARGOS 크기 + 40cm 감속 여유
      points: "[[0.75, 0.60], [0.75, -0.60], [-0.75, -0.60], [-0.75, 0.60]]"
      action_type: "slowdown"
      min_points: 4
      slowdown_ratio: 0.5
      visualize: true
      polygon_pub_topic: "polygon_slowdown"
      enabled: true
    observation_sources: ["scan"]
    scan:
      source_timeout: 0.2
      type: "scan"
      topic: "scan"
      enabled: true

# ===== slam_toolbox (nav2_bringup slam=True 모드에서 사용) =====
slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # 좌표계 (diff_drive_controller와 통일)
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: scan

    # 지도 해상도
    resolution: 0.05

    # ARGOS LiDAR 범위 (12m 중 10m 활용)
    max_laser_range: 10.0

    # 지도 업데이트 조건
    minimum_travel_distance: 0.3
    minimum_travel_heading: 0.3

    # 스캔 버퍼
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0

    # 루프 클로저
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    # 스캔 매칭
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # 패널티
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    # TF/타이밍
    transform_publish_period: 0.02
    map_update_interval: 5.0
    tf_buffer_duration: 30.0
    transform_timeout: 0.2

    # WSL2 환경
    stack_size_to_use: 40000000

    # 모드
    mode: mapping
    enable_interactive_mode: true
    map_file_name: ''
    map_start_at_dock: false
