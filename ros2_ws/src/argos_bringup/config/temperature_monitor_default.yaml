# Temperature Monitor - Default Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# 이 파일은 안전한 기본값을 정의합니다.
# 다른 환경별 설정 파일이 이것을 기반으로 특정 값만 오버라이드합니다.
#
# 수정 이력:
# - 2026-02-08: 초기 생성
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

temperature_monitor:
  ros__parameters:
    # 온도 임계값 (°C)
    threshold_high: 28.0  # 이 값을 초과하면 고온 경고
    threshold_low: 22.0   # 이 값 미만이면 저온 경고
