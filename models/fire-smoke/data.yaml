# D-Fire 데이터셋 YOLO 학습 설정
# https://github.com/gaiasd/DFireDataset
# 다운로드: https://www.kaggle.com/datasets/sayedgamal99/smoke-fire-detection-yolo

path: ./datasets/d-fire  # 데이터셋 루트 경로 (학습 시 수정)
train: images/train
val: images/val
test: images/test

# 클래스 (2종)
names:
  0: fire
  1: smoke

# 학습 정보
# 총 이미지: 21,527장 (train 14,122 / val 3,099 / test 4,306)
# 어노테이션: 26,557개 바운딩박스
# 구성: 화재만(1,164) + 연기만(5,867) + 화재+연기(4,658) + 정상(9,838)

# 데이터 버전 관리 (AI 전문가 권고)
